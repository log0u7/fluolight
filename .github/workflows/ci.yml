name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # Job 1: report flash/RAM delta on PRs (default profile)
  size-report:
    name: Size report (default profile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TimedAction
        run: git clone --depth 1 https://github.com/log0u7/TimedAction.git /tmp/TimedAction

      - name: Compile and report size delta
        uses: arduino/compile-sketches@v1
        with:
          fqbn: fluo:avr:fluoeth
          platforms: |
            - name: arduino:avr
            - name: fluo:avr
              source-url: https://raw.githubusercontent.com/VashTheProgrammer/FLUOboard/master/package_fluo_index.json
          libraries: |
            - source-path: /tmp/TimedAction
          sketch-paths: ./
          enable-deltas-report: true

      - name: Post size report on PR
        uses: arduino/report-size-deltas@v1
        if: github.event_name == 'pull_request'
        with:
          sketches-report-path: sketches-reports

  # Job 2: compile all profiles + flash guard (> 100% = failure)
  build-matrix:
    name: Build (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: default
            flags: ""
          - profile: prod-minimal
            flags: "-DVERBOSE=0 -DDHCP=1 -DEXT_LINK_CHECK=2 -DRESET_ON_FAIL=0 -DWATCHDOG=0"
          - profile: prod-robuste
            flags: "-DVERBOSE=1 -DDHCP=0 -DEXT_LINK_CHECK=0 -DRESET_ON_FAIL=2 -DWATCHDOG=1"
          - profile: dev-verbose
            flags: "-DVERBOSE=3 -DDHCP=0 -DEXT_LINK_CHECK=2 -DRESET_ON_FAIL=0 -DWATCHDOG=0"

    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Cache arduino15 (core + libs)
        uses: actions/cache@v4
        with:
          path: ~/.arduino15
          key: arduino15-fluo-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: arduino15-fluo-

      - name: Install cores
        run: |
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/VashTheProgrammer/FLUOboard/master/package_fluo_index.json
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli core install fluo:avr

      - name: Install TimedAction
        run: git clone --depth 1 https://github.com/log0u7/TimedAction.git /tmp/TimedAction

      - name: Compile (${{ matrix.profile }})
        id: compile
        run: |
          FLASH_MAX=28672
          FLAGS="${{ matrix.flags }}"
          EXTRA_PROPS=()
          [ -n "$FLAGS" ] && EXTRA_PROPS=(--build-property "compiler.cpp.extra_flags=$FLAGS")

          if ! arduino-cli compile \
            --fqbn fluo:avr:fluoeth \
            --libraries /tmp/TimedAction \
            "${EXTRA_PROPS[@]}" \
            --format json \
            . > /tmp/build.json 2>&1; then
            echo "Compilation failed - build output:"
            cat /tmp/build.json
            exit 1
          fi

          FLASH=$(python3 -c "
          import json, sys
          data = json.load(open('/tmp/build.json'))
          sections = data.get('builder_result', {}).get('executable_sections_size', [])
          flash = next((s['size'] for s in sections if s['name'] in ('.text','text')), None)
          print(flash if flash is not None else 0)
          ")

          PCT=$(python3 -c "print(round($FLASH * 100 / $FLASH_MAX, 1))")
          echo "flash=$FLASH" >> $GITHUB_OUTPUT
          echo "pct=$PCT"     >> $GITHUB_OUTPUT
          echo "Profile: ${{ matrix.profile }} - Flash: $FLASH / $FLASH_MAX bytes ($PCT%)"

          if [ "$FLASH" -gt "$FLASH_MAX" ]; then
            echo "ERROR: flash overflow ($FLASH > $FLASH_MAX)"
            exit 1
          fi

  # Job 3: lint Python test server
  lint-python:
    name: Lint Python (server scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Syntax check
        run: |
          python -m py_compile server/test_server.py
          python -m py_compile server/pipeline_server.py
